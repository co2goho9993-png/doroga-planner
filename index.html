    .stage {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 18px;
      touch-action: pan-x pan-y;
      overscroll-behavior: contain;
    }

    .stage.pan-mode {
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .stage.pan-mode.panning {
      cursor: grabbing;
    }

    .stage.pan-mode .sheet {
      pointer-events: auto;
    }

    .sheet-wrap {
      width: calc(var(--sheet-w) * var(--scale));
      height: calc(var(--sheet-h) * var(--scale));
      min-width: calc(var(--sheet-w) * var(--scale));
      min-height: calc(var(--sheet-h) * var(--scale));
      margin: 0 auto;
    }

    .sheet {
      position: relative;
      width: var(--sheet-w);
      height: var(--sheet-h);
      background: #ffffff;
      color: var(--ink);
      overflow: hidden;
      transform-origin: top left;
      transform: scale(var(--scale));
      box-shadow: 0 18px 70px rgba(0, 0, 0, .45);
      user-select: none;
    }

    .sheet.exporting {

    .cell {

    .venue .font-regular,

    .modal {

    .editor-panel {

      padding: 16px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
      background: #0b1220;
    }

    .editor-tools input[type="number"] {
      width: 110px;
      height: 50px;
      padding: 0 12px;
      color: #fff;
      background: #172033;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 6px;
    }

      font-family: "PF Din Text Comp Pro", Arial, sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;

    .editor-font-icon.medium { font-weight: 500; }
    .editor-font-icon.bold { font-weight: 700; }

    .editor-font-icon.italic {
      display: inline-block;
      font-weight: 500;
      font-style: italic;
      transform: skewX(-13deg);
    }

    .swatch {
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, .45);
      border-radius: 50%;
      background: var(--swatch);
    }

    .editor-tools .swatch[data-bg="#ffffff"],
    .editor-tools .swatch[data-bg="#7dc8ee"] {
      display: none;

    .editor-area {
      min-height: 320px;
      padding: 28px;
      overflow: auto;
      outline: 0;
      background: #111827;
      color: #f8fafc;

      border-radius: 6px;
      background: rgba(15, 23, 42, .94);
      color: #cbd5e1;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;

    .status.visible {

      }

        text-align: right;
      }
    }

    @page {
      size: A3 landscape;
      margin: 0;
    }

    @media print {
      html, body { height: auto; overflow: visible; }
      body { background: #fff; }
      .app { height: auto; min-height: 0; overflow: visible; }
      .toolbar, .modal, .mobile-zoom { display: none !important; }
      .stage { padding: 0; overflow: visible; }
      .sheet-wrap { width: 420mm; height: 297mm; }
      .sheet {

        box-shadow: none;
      }
    }
  </style>

  <script>
    const SHEET_W = 4961;
    const SHEET_H = 3508;
    const TABLE_X = 421;
    const TABLE_W = 4486;
    const VENUE_X = 145;
    const VENUE_W = 267;
    const GAP_X = 9;
    const GAP_Y = 11;
    const MIN_COL = 110;
    const MIN_ROW = 48;
    const CELL_HEIGHT_BUFFER = 16;
    const A3_400_SCALE = 400 / 300;
    const LEGEND_TITLE_Y = 3354;
    const LEGEND_CHIP_Y = 3363;
    const TABLE_BOTTOM_LIMIT = 3301;

    const colors = {
      blue: "#234497",
      blueSoft: "#cad1e3",
      hall: "#7dc8ee",
      mint: "#b8e4e2",
      rose: "#f4d8e0",
      peach: "#ffe2c4",
      violet: "#eddfff",
      white: "#ffffff"
    };

    const timeLabels = [
      "09:00 –\n09:30", "09:30 –\n10:00", "10:00 –\n10:30", "10:30 –\n11:00",
      "11:00 –\n11:30", "11:30 –\n12:00", "12:00 –\n12:30", "12:30 –\n13:00",
      "13:00 –\n13:30", "13:30 –\n14:00", "14:00 –\n14:30", "14:30 –\n15:00",
      "15:00 –\n15:30", "15:30 –\n16:00", "16:00 –\n16:30", "16:30 –\n17:00",
      "17:00 –\n17:30", "17:30 –\n18:00", "18:00 –\n18:30", "18:30 –\n19:00",
      "19:00 –\n19:30"
    ];

    const sections = [
      { id: "s0", headerY: 167, bodyY: 285, stripeY: 285, stripeH: 310, date: "13 октября\nвторник", rowHeights: [310], venue: ["Выставочный\nпавильон"] },
      { id: "s1", headerY: 606, bodyY: 726, stripeY: 726, stripeH: 805, date: "13 октября\nвторник", rowHeights: Array(8).fill(91), venue: ["Выставочный\nпавильон", "Пресс-Центр", "Зал Краснодар\n(380чел)", "Зал Сочи\n(150 чел)", "Зал Анапа\n(150 чел)", "Зал Сириус\n(круглый стол 60 чел)", "Зал Дагомыс\n(70 чел)", ""] },
      { id: "s2", headerY: 1542, bodyY: 1662, stripeY: 1662, stripeH: 805, date: "14 октября\nсреда", rowHeights: Array(8).fill(91), venue: ["Выставочный\nпавильон", "Пресс-Центр", "Зал Краснодар\n(380чел)", "Зал Сочи\n(150 чел)", "Зал Анапа\n(150 чел)", "Зал Сириус\n(круглый стол 60 чел)", "Зал Дагомыс\n(70 чел)", ""] },
      { id: "s3", headerY: 2478, bodyY: 2598, stripeY: 2598, stripeH: 703, date: "15 октября\nчетверг", rowHeights: Array(7).fill(91), venue: ["Выставочный\nпавильон", "Пресс-Центр", "Зал Краснодар\n(380чел)", "Зал Сочи\n(150 чел)", "Зал Анапа\n(150 чел)", "Зал Сириус\n(круглый стол 60 чел)", "Зал Дагомыс\n(70 чел)"] }
    ];

    const state = {
      zoom: 18,
      colWidths: [205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 205, 206, 205, 205, 205, 205],
      text: {},
      cells: {},
      merged: {},
      hidden: {},
      bg: {},
      fontSize: {},
      groupFontSize: {}
    };

    const sheet = document.getElementById("sheet");
    const stage = document.getElementById("stage");
    const statusEl = document.getElementById("status");
    const zoomRange = document.getElementById("zoomRange");
    const mobileZoomRange = document.getElementById("mobileZoomRange");
    const zoomValue = document.getElementById("zoomValue");
    const modal = document.getElementById("modal");
    const editorArea = document.getElementById("editorArea");
    const editorTitle = document.getElementById("editorTitle");
    const fontSizeInput = document.getElementById("fontSizeInput");
    let activeTarget = null;
    let savedEditorRange = null;
    let selectMode = false;
    let panMode = false;
    let panDrag = null;
    let pinchZoom = null;
    const selected = new Set();

    function htmlEscape(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[ch]));
    }

    function flowHtml(html) {
      return `<span class="text-flow">${html}</span>`;
    }

    function editorHtmlFromElement(el) {
      const flow = el.children.length === 1 && el.firstElementChild?.classList.contains("text-flow")
        ? el.firstElementChild
        : null;
      return flow ? flow.innerHTML : el.innerHTML;
    }

    function styleBox(el, x, y, w, h) {
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.width = `${w}px`;
      el.style.height = `${h}px`;
    }

    function xForCol(col) {
      let x = TABLE_X;
      for (let i = 0; i < col; i++) x += state.colWidths[i] + GAP_X;
      return x;
    }

    function yForRow(section, row) {
      let y = section.bodyY;
      for (let i = 0; i < row; i++) y += section.rowHeights[i] + GAP_Y;
      return y;
    }

    const sectionLayoutDefaults = sections.map(section => ({
      initialHeaderY: section.headerY,
      bodyOffset: section.bodyY - section.headerY,
      baseRowHeights: section.rowHeights.slice()
    }));

    function rowBlockHeight(section) {
      return section.rowHeights.reduce((total, height) => total + height, 0) + GAP_Y * Math.max(0, section.rowHeights.length - 1);
    }

    function tableBottomY() {
      refreshSectionLayout();
      const last = sections[sections.length - 1];
      return last.stripeY + last.stripeH;
    }

    function refreshSectionLayout() {
      let headerY = sectionLayoutDefaults[0].initialHeaderY;
      sections.forEach((section, index) => {
        const defaults = sectionLayoutDefaults[index];
        section.headerY = headerY;
        section.bodyY = section.headerY + defaults.bodyOffset;
        section.stripeY = section.bodyY;
        section.stripeH = rowBlockHeight(section);
        headerY = section.stripeY + section.stripeH + GAP_Y;
      });
    }

    function setStatus(text) {
      statusEl.textContent = text;
      statusEl.classList.toggle("visible", Boolean(text));
      clearTimeout(setStatus.timer);
      setStatus.timer = setTimeout(() => {
        statusEl.textContent = "";
        statusEl.classList.remove("visible");
      }, 2400);
    }

    function timeCellIds() {
      return sections.flatMap(section => timeLabels.map((_, col) => `${section.id}-time-${col}`));
    }

    function venueCellIds() {
      return sections.flatMap(section => section.rowHeights.map((_, row) => `${section.id}-venue-${row}`));
    }

    function elementFontSize(el, fallback) {
      const id = el.dataset.id;
      if (el.classList.contains("time-cell")) return state.groupFontSize.timeCells || state.fontSize[id] || fallback;
      if (el.classList.contains("venue")) return state.groupFontSize.venues || state.fontSize[id] || fallback;
      return state.fontSize[id] || fallback;
    }

    function syncFontSizeGroup(group, fontSize) {
      state.groupFontSize[group] = fontSize;
      const ids = group === "timeCells" ? timeCellIds() : venueCellIds();
      ids.forEach(itemId => {
        state.fontSize[itemId] = fontSize;
      });
    }

    function dateMarkup(value) {
      const [main, weekday] = String(value).split(/\n/);
      return `<span class="date-stack"><span class="date-main">${htmlEscape(main || "")}</span>${weekday ? `<span class="date-weekday">${htmlEscape(weekday)}</span>` : ""}</span>`;
    }

    function normalizeTypography(root) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      let quoteOpen = true;
      for (const node of nodes) {
        let text = node.nodeValue;
        text = text.replace(/(\d)\s*%/g, "$1 %");
        text = text.replace(/(^|[\s([{])--(?=\s|$)/g, "$1—");
        text = text.replace(/(\s)-(\s)/g, "$1–$2");
        text = text.replace(/"([^"]*)"/g, "«$1»");
        text = text.replace(/"/g, () => {
          const q = quoteOpen ? "«" : "»";
          quoteOpen = !quoteOpen;
          return q;
        });
        node.nodeValue = text;
      }
    }

    function normalizeTypographyText(value) {
      const holder = document.createElement("div");
      holder.textContent = value;
      normalizeTypography(holder);
      return holder.textContent;
    }

    function textFromEditorHtml(html) {
      const holder = document.createElement("div");
      holder.innerHTML = String(html)
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/(div|p)>/gi, "\n");
      return holder.textContent;
    }

    function sanitizeEditorHtml(html) {
      const template = document.createElement("template");
      template.innerHTML = html;
      const fontClasses = ["font-regular", "font-medium", "font-bold"];
      template.content.querySelectorAll("*").forEach(el => {
        const tag = el.tagName.toLowerCase();
        const style = el.getAttribute("style") || "";
        const bold = /font-weight\s*:\s*(bold|[6-9]00)/i.test(style);
        const italic = /font-style\s*:\s*italic/i.test(style);
        const fontClass = fontClasses.find(className => el.classList.contains(className));
        const isItalic = italic || el.classList.contains("font-italic") || ["I", "EM"].includes(el.tagName);
        el.removeAttribute("style");
        el.removeAttribute("class");
        el.removeAttribute("id");
        if (fontClass) el.classList.add(fontClass);
        if (isItalic) el.classList.add("font-italic");
        if (tag === "span" && (bold || italic)) {
          const replacement = document.createElement("span");
          if (fontClass) replacement.classList.add(fontClass);
          if (isItalic) replacement.classList.add("font-italic");
          if (bold && !fontClass) replacement.classList.add("font-bold");
          while (el.firstChild) replacement.appendChild(el.firstChild);
          el.replaceWith(replacement);
        }
      });
      return template.innerHTML;
    }

    function hasExplicitFontMarkup(html) {
      return /font-(regular|medium|bold|italic)|<(b|strong|i|em)\b|font-(weight|style)\s*:/i.test(String(html));
    }

    function enforceMainTitleSpacing(html) {
      const holder = document.createElement("div");
      holder.innerHTML = html;
      const walker = document.createTreeWalker(holder, NodeFilter.SHOW_TEXT);
      while (walker.nextNode()) {
        walker.currentNode.nodeValue = walker.currentNode.nodeValue.replace(/(»\.)\s*(13[–-]15)/g, "$1\u00a0$2");
      }
      return holder.innerHTML;
    }

    function selectedEditorRange() {
      editorArea.focus();
      restoreEditorSelection();
      const selection = window.getSelection();
      if (!selection.rangeCount || !editorArea.contains(selection.getRangeAt(0).commonAncestorContainer)) {
        const fullRange = document.createRange();
        fullRange.selectNodeContents(editorArea);
        selection.removeAllRanges();
        selection.addRange(fullRange);
      }
      const range = selection.getRangeAt(0);
      if (range.collapsed) range.selectNodeContents(editorArea);
      if (!editorArea.contains(range.commonAncestorContainer)) return null;
      return { selection, range };
    }

    function applyInlineFont(className) {
      const selected = selectedEditorRange();
      if (!selected) return;
      const { selection, range } = selected;
      const span = document.createElement("span");
      span.className = className;
      span.appendChild(range.extractContents());
      range.insertNode(span);
      selection.removeAllRanges();
      const nextRange = document.createRange();
      nextRange.selectNodeContents(span);
      selection.addRange(nextRange);
      saveEditorSelection();
      updateFontButtons();
    }

    function applyInlineClass(className) {
      const selected = selectedEditorRange();
      if (!selected) return;
      const { selection, range } = selected;
      const span = document.createElement("span");
      span.className = className;
      span.appendChild(range.extractContents());
      range.insertNode(span);
      selection.removeAllRanges();
      const nextRange = document.createRange();
      nextRange.selectNodeContents(span);
      selection.addRange(nextRange);
      saveEditorSelection();
      updateFontButtons();
    }

    function editorContainsNode(node) {
      return node === editorArea || editorArea.contains(node);
    }

    function saveEditorSelection() {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      if (editorContainsNode(range.commonAncestorContainer)) savedEditorRange = range.cloneRange();
    }

    function restoreEditorSelection() {
      if (!savedEditorRange) return;
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(savedEditorRange);
    }

    function fontClassFromNode(node) {
      const el = node?.nodeType === Node.ELEMENT_NODE ? node : node?.parentElement;
      const match = el?.closest?.(".font-bold, .font-medium, .font-regular, .venue-title, .venue-note, b, strong");
      if (match?.classList?.contains("font-bold") || ["B", "STRONG"].includes(match?.tagName)) return "font-bold";
      if (match?.classList?.contains("font-medium") || match?.classList?.contains("venue-title")) return "font-medium";
      if (match?.classList?.contains("font-regular") || match?.classList?.contains("venue-note")) return "font-regular";
      if (activeTarget?.classList.contains("venue")) return "font-medium";
      if (activeTarget?.classList.contains("time-cell") || activeTarget?.classList.contains("title-main") || activeTarget?.classList.contains("date-stripe")) return "font-bold";
      return "font-regular";
    }

    function currentItalicState() {
      const selection = window.getSelection();
      const node = selection.rangeCount && editorArea.contains(selection.getRangeAt(0).commonAncestorContainer)
        ? selection.getRangeAt(0).startContainer
        : savedEditorRange?.startContainer;
      const el = node?.nodeType === Node.ELEMENT_NODE ? node : node?.parentElement;
      return Boolean(el?.closest?.(".font-italic, i, em"));
    }

    function currentFontClass() {
      const selection = window.getSelection();
      if (selection.rangeCount && editorArea.contains(selection.getRangeAt(0).commonAncestorContainer)) {
        return fontClassFromNode(selection.getRangeAt(0).startContainer);
      }
      if (savedEditorRange) return fontClassFromNode(savedEditorRange.startContainer);
      return fontClassFromNode(editorArea);
    }

    function updateFontButtons() {
      const className = currentFontClass();
      document.querySelectorAll("[data-font]").forEach(button => {
        button.classList.toggle("active", button.dataset.font === className);
      });
      document.querySelectorAll("[data-italic]").forEach(button => {
        button.classList.toggle("active", currentItalicState());
      });
    }

    function sanitizeVenueHtml(html) {
      if (hasExplicitFontMarkup(html)) {
        const preparedHtml = String(html)
          .replace(/class="venue-title"/g, 'class="font-medium"')
          .replace(/class="venue-note"/g, 'class="font-regular"');
        return sanitizeEditorHtml(preparedHtml)
          .replace(/<br\s*\/?>/gi, "<br>")
          .replace(/<\/(div|p)>/gi, "<br>");
      }
      let text = normalizeTypographyText(textFromEditorHtml(html))
        .replace(/[ \t]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .replace(/\n{2,}/g, "\n")
        .trim();
      text = text.replace(/^Выставочный\s+павильон$/i, "Выставочный\nпавильон");
      text = text.replace(/^(Зал\s+[^\n(]+)\s+(\([^)]*\))$/i, "$1\n$2");
      text = text.replace(/^(Зал\s+Краснодар)\s*(\([^)]*\))$/i, "$1\n$2");
      text = text.replace(/^(Зал\s+Сочи)\s*(\([^)]*\))$/i, "$1\n$2");
      text = text.replace(/^(Зал\s+Анапа)\s*(\([^)]*\))$/i, "$1\n$2");
      text = text.replace(/^(Зал\s+Сириус)\s*(\([^)]*\))$/i, "$1\n$2");
      text = text.replace(/^(Зал\s+Дагомыс)\s*(\([^)]*\))$/i, "$1\n$2");
      const lines = text.split("\n");
      const lastLine = lines.at(-1) || "";
      if (lines.length > 1 && /^\([^)]*\)$/.test(lastLine)) {
        const title = lines.slice(0, -1).join("\n");
        return `<span class="venue-title">${htmlEscape(title)}</span><span class="venue-note">${htmlEscape(lastLine)}</span>`;
      }
      return `<span class="venue-title">${htmlEscape(text)}</span>`;
    }

    function fitElementsInside(elements, minSize = 18) {
      const items = [...elements];
      if (!items.length) return;
      let size = Math.min(...items.map(el => parseInt(el.style.fontSize, 10) || 30));
      items.forEach(el => { el.style.fontSize = `${size}px`; });
      const hasOverflow = () => items.some(el => el.scrollWidth > el.clientWidth + 1 || el.scrollHeight > el.clientHeight + 1);
      while (size > minSize && hasOverflow()) {
        size -= 1;
        items.forEach(el => { el.style.fontSize = `${size}px`; });
      }
    }

    function fitVenueGroup() {
      fitElementsInside(sheet.querySelectorAll(".venue"), 20);
    }

    function parseCellId(id) {
      const [sectionId, row, col] = String(id).split("-");
      const section = sections.find(item => item.id === sectionId);
      if (!section || row === undefined || col === undefined) return null;
      return { section, sectionId, row: Number(row), col: Number(col) };
    }

    function rangeIndexes(start, count) {
      return Array.from({ length: count }, (_, index) => start + index);
    }

    function sumByIndexes(values, indexes) {
      return indexes.reduce((total, index) => total + values[index], 0);
    }

    function redistributeSize(values, targetIndexes, requestedIncrease, minValue) {
      if (requestedIncrease <= .5) return 0;
      const target = new Set(targetIndexes);
      const donors = values
        .map((value, index) => ({ index, spare: target.has(index) ? 0 : Math.max(0, value - minValue) }))
        .filter(item => item.spare > 0);
      const spare = donors.reduce((total, item) => total + item.spare, 0);
      const applied = Math.min(requestedIncrease, spare);
      if (applied <= .5) return 0;
      const targetTotal = sumByIndexes(values, targetIndexes) || targetIndexes.length;
      targetIndexes.forEach(index => {
        const share = values[index] / targetTotal || 1 / targetIndexes.length;
        values[index] += applied * share;
      });
      donors.forEach(item => {
        values[item.index] -= applied * (item.spare / spare);
      });
      return applied;
    }

    function expandTargetSize(values, targetIndexes, requestedIncrease) {
      if (requestedIncrease <= .5) return 0;
      const targetTotal = sumByIndexes(values, targetIndexes) || targetIndexes.length;
      targetIndexes.forEach(index => {
        const share = values[index] / targetTotal || 1 / targetIndexes.length;
        values[index] += requestedIncrease * share;
      });
      return requestedIncrease;
    }

    function releaseSize(values, targetIndexes, requestedDecrease, minValue) {
      if (requestedDecrease <= .5) return 0;
      const target = new Set(targetIndexes);
      const recipients = values
        .map((value, index) => ({ index, value }))
        .filter(item => !target.has(item.index));
      if (!recipients.length) return 0;
      const targetSpare = targetIndexes.reduce((total, index) => total + Math.max(0, values[index] - minValue), 0);
      const applied = Math.min(requestedDecrease, targetSpare);
      if (applied <= .5) return 0;
      targetIndexes.forEach(index => {
        const spare = Math.max(0, values[index] - minValue);
        values[index] -= applied * (spare / targetSpare);
      });
      const recipientTotal = recipients.reduce((total, item) => total + item.value, 0) || recipients.length;
      recipients.forEach(item => {
        const share = item.value / recipientTotal || 1 / recipients.length;
        values[item.index] += applied * share;
      });
      return applied;
    }

    function measureCellContent(el, width) {
      const style = getComputedStyle(el);
      const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
      const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
      const borderX = parseFloat(style.borderLeftWidth) + parseFloat(style.borderRightWidth);
      const borderY = parseFloat(style.borderTopWidth) + parseFloat(style.borderBottomWidth);
      const contentWidth = Math.max(1, width - padX - borderX);
      const source = el.children.length === 1 && el.firstElementChild?.classList.contains("text-flow")
        ? el.firstElementChild
        : el;
      const probe = document.createElement("div");
      probe.className = "cell";
      probe.style.position = "absolute";
      probe.style.left = "-10000px";
      probe.style.top = "0";
      probe.style.width = `${contentWidth}px`;
      probe.style.height = "auto";
      probe.style.display = "block";
      probe.style.padding = "0";
      probe.style.border = "0";
      probe.style.minHeight = "0";
      probe.style.maxHeight = "none";
      probe.style.visibility = "hidden";
      probe.style.pointerEvents = "none";
      probe.style.overflow = "visible";
      probe.style.whiteSpace = "normal";
      probe.style.overflowWrap = "anywhere";
      probe.style.wordBreak = "normal";
      probe.style.fontFamily = style.fontFamily;
      probe.style.fontSize = style.fontSize;
      probe.style.fontWeight = style.fontWeight;
      probe.style.fontStyle = style.fontStyle;
      probe.style.lineHeight = style.lineHeight;
      probe.innerHTML = source.innerHTML;
      document.body.appendChild(probe);
      const contentHeight = Math.ceil(probe.scrollHeight);
      const contentScrollWidth = Math.ceil(probe.scrollWidth);
      const result = {
        width: contentScrollWidth + padX + borderX,
        height: contentHeight + padY + borderY
      };
      probe.remove();
      return result;
    }

    function sameIndexes(a, b) {
      return a.length === b.length && a.every((value, index) => value === b[index]);
    }

    function requiredHeightForRows(section, rowIndexes) {
      let required = MIN_ROW * rowIndexes.length;
      sheet.querySelectorAll(`.cell[data-section="${section.id}"]`).forEach(cell => {
        if (state.hidden[cell.dataset.id]) return;
        const merge = state.merged[cell.dataset.id] || { rows: 1, cols: 1 };
        const cellRows = rangeIndexes(Number(cell.dataset.row), merge.rows);
        if (!sameIndexes(cellRows, rowIndexes)) return;
        const cellCols = rangeIndexes(Number(cell.dataset.col), merge.cols);
        const width = sumByIndexes(state.colWidths, cellCols) + GAP_X * (merge.cols - 1);
        const measured = measureCellContent(cell, width);
        required = Math.max(required, measured.height + CELL_HEIGHT_BUFFER - GAP_Y * (merge.rows - 1));
      });
      return required;
    }

    function baseRowHeight(section, row) {
      const defaults = sectionLayoutDefaults[sections.indexOf(section)];
      return defaults?.baseRowHeights[row] ?? MIN_ROW;
    }

    function fitRowsToText() {
      let changed = false;
      sections.forEach(section => {
        const base = section.rowHeights.map((_, row) => Math.max(MIN_ROW, baseRowHeight(section, row)));
        const minRequired = section.rowHeights.map(() => MIN_ROW);
        sheet.querySelectorAll(`.cell[data-section="${section.id}"]`).forEach(cell => {
          const id = cell.dataset.id;
          if (state.hidden[id] || !(state.cells[id] || "").trim()) return;
          const merge = state.merged[id] || { rows: 1, cols: 1 };
          const rowIndexes = rangeIndexes(Number(cell.dataset.row), merge.rows);
          const colIndexes = rangeIndexes(Number(cell.dataset.col), merge.cols);
          const width = sumByIndexes(state.colWidths, colIndexes) + GAP_X * (merge.cols - 1);
          const measured = measureCellContent(cell, width);
          const neededTotal = Math.max(
            MIN_ROW * merge.rows,
            Math.ceil(measured.height + CELL_HEIGHT_BUFFER - GAP_Y * (merge.rows - 1))
          );
          const currentRequiredTotal = sumByIndexes(minRequired, rowIndexes);
          const deficit = neededTotal - currentRequiredTotal;
          if (deficit <= .5) return;
          rowIndexes.forEach(row => {
            minRequired[row] += deficit / rowIndexes.length;
          });
        });
        const allRows = base.map((_, row) => row);
        const targetTotal = sumByIndexes(base, allRows);
        const target = base.map((height, row) => Math.max(height, minRequired[row]));
        let excess = sumByIndexes(target, allRows) - targetTotal;
        if (excess > .5) {
          const spare = target.reduce((total, height, row) => total + Math.max(0, height - minRequired[row]), 0);
          const applied = Math.min(excess, spare);
          if (applied > .5 && spare > .5) {
            target.forEach((height, row) => {
              const rowSpare = Math.max(0, height - minRequired[row]);
              target[row] = height - applied * (rowSpare / spare);
            });
            excess -= applied;
          }
        }
        if (excess > .5) {
          const spare = target.reduce((total, height) => total + Math.max(0, height - MIN_ROW), 0);
          const applied = Math.min(excess, spare);
          if (applied > .5 && spare > .5) {
            target.forEach((height, row) => {
              const rowSpare = Math.max(0, height - MIN_ROW);
              target[row] = height - applied * (rowSpare / spare);
            });
          }
        }
        section.rowHeights.forEach((height, row) => {
          const next = Math.ceil(Math.max(MIN_ROW, target[row]));
          if (Math.abs(height - next) > .5) {
            section.rowHeights[row] = next;
            changed = true;
          }
        });
      });
      return changed;
    }

    function autoFitCell(id) {
      const parsed = parseCellId(id);
      const el = parsed ? [...sheet.querySelectorAll(".cell")].find(cell => cell.dataset.id === id) : null;
      if (!parsed || !el || state.hidden[id]) return false;
      const merge = state.merged[id] || { rows: 1, cols: 1 };
      const colIndexes = rangeIndexes(parsed.col, merge.cols);
      const rowIndexes = rangeIndexes(parsed.row, merge.rows);
      const currentW = sumByIndexes(state.colWidths, colIndexes) + GAP_X * (merge.cols - 1);
      const currentH = sumByIndexes(parsed.section.rowHeights, rowIndexes) + GAP_Y * (merge.rows - 1);
      let measured = measureCellContent(el, currentW);
      let changed = false;

      if (measured.width > currentW + 2 || measured.height > currentH + 2) {
        const otherColSpare = state.colWidths.reduce((total, width, index) => (
          colIndexes.includes(index) ? total : total + Math.max(0, width - MIN_COL)
        ), 0);
        const maxW = currentW + otherColSpare;
        let bestW = currentW;
        let best = measured;
        const directW = Math.min(maxW, Math.max(currentW, measured.width + 4));
        const candidates = [directW, currentW * 1.18, currentW * 1.35, currentW * 1.6, currentW * 2]
          .map(value => Math.min(maxW, Math.ceil(value)))
          .filter((value, index, list) => value > currentW + 2 && list.indexOf(value) === index)
          .sort((a, b) => a - b);
        for (const width of candidates) {
          const next = measureCellContent(el, width);
          if (next.height < best.height || next.width < best.width) {
            best = next;
            bestW = width;
          }
          if (next.height <= currentH + 2 && next.width <= width + 2) break;
        }
        const widthIncrease = Math.max(0, bestW - currentW);
        if (redistributeSize(state.colWidths, colIndexes, widthIncrease, MIN_COL) > 0) {
          changed = true;
          measured = best;
        }
      }

      const finalW = sumByIndexes(state.colWidths, colIndexes) + GAP_X * (merge.cols - 1);
      measured = measureCellContent(el, finalW);
      const currentRowTotal = sumByIndexes(parsed.section.rowHeights, rowIndexes);
      const rowGaps = GAP_Y * (merge.rows - 1);
      const desiredRowTotal = Math.max(
        MIN_ROW * merge.rows,
        measured.height + CELL_HEIGHT_BUFFER - rowGaps,
        requiredHeightForRows(parsed.section, rowIndexes)
      );
      const heightIncrease = Math.max(0, desiredRowTotal - currentRowTotal);
      const redistributedHeight = redistributeSize(parsed.section.rowHeights, rowIndexes, heightIncrease, MIN_ROW);
      if (redistributedHeight > 0) {
        changed = true;
      }
      if (expandTargetSize(parsed.section.rowHeights, rowIndexes, heightIncrease - redistributedHeight) > 0) {
        changed = true;
      }
      const heightDecrease = Math.max(0, currentRowTotal - desiredRowTotal);
      if (releaseSize(parsed.section.rowHeights, rowIndexes, heightDecrease, MIN_ROW) > 0) {
        changed = true;
      }
      return changed;
    }

        for (let c = col; c < col + merge.cols; c++) w += state.colWidths[c] + (c > col ? GAP_X : 0);
        for (let r = row; r < row + merge.rows; r++) h += section.rowHeights[r] + (r > row ? GAP_Y : 0);
      }

      if (!activeTarget) return closeEditor();
      normalizeTypography(editorArea);
      const id = activeTarget.dataset.id;
      const shouldAutoFitCell = activeTarget.classList.contains("cell") && !state.hidden[id];
      const fontSize = Math.max(10, Math.min(72, parseInt(fontSizeInput.value, 10) || 24));
      if (activeTarget.classList.contains("cell")) {
        state.cells[id] = sanitizeEditorHtml(editorArea.innerHTML);
        state.bg[id] = activeTarget.dataset.nextBg || state.bg[id] || activeTarget.style.backgroundColor || "#ffffff";
      } else if (activeTarget.classList.contains("venue")) {
        state.text[id] = sanitizeVenueHtml(editorArea.innerHTML);

        if (id === "mainTitle") cleanHtml = enforceMainTitleSpacing(cleanHtml);

      }
      if (activeTarget.classList.contains("time-cell")) {
        syncFontSizeGroup("timeCells", fontSize);

      } else if (activeTarget.classList.contains("venue")) {

      } else {
        state.fontSize[id] = fontSize;

    function mergeSelected() {
      const ids = activeCellIds();
      if (ids.length < 2) return setStatus("Выберите несколько ячеек");
      const parts = ids.map(id => {

      });
      const section = parts[0].section;
      if (!parts.every(p => p.section === section)) return setStatus("Объединение только внутри одного блока");
      const minRow = Math.min(...parts.map(p => p.row));
      const maxRow = Math.max(...parts.map(p => p.row));
      const minCol = Math.min(...parts.map(p => p.col));
      const maxCol = Math.max(...parts.map(p => p.col));
      const expected = (maxRow - minRow + 1) * (maxCol - minCol + 1);
      if (expected !== parts.length) return setStatus("Нужно выделить прямоугольник ячеек");
      const master = `${section}-${minRow}-${minCol}`;
      const html = parts.map(p => state.cells[p.id]).filter(Boolean).join("<br>");
      const bg = parts.map(p => meaningfulBg(state.bg[p.id])).find(Boolean);
      state.merged[master] = { rows: maxRow - minRow + 1, cols: maxCol - minCol + 1 };
      if (html) state.cells[master] = html;
      if (bg) state.bg[master] = bg;
      for (const p of parts) {
        if (p.id !== master) state.hidden[p.id] = master;
      }
      selected.clear();
      setStatus("Ячейки объединены");
      render();
      if (autoFitFilledCells()) render();
    }

    function splitSelected() {
      const ids = activeCellIds();
      const id = ids[0];
      if (!id || !state.merged[id]) return setStatus("Выберите объединенную ячейку");
      const merge = state.merged[id];
      const [section, row, col] = id.split("-");
      for (let r = Number(row); r < Number(row) + merge.rows; r++) {
        for (let c = Number(col); c < Number(col) + merge.cols; c++) {
          delete state.hidden[`${section}-${r}-${c}`];
        }
      }
      delete state.merged[id];
      selected.clear();
      setStatus("Ячейка разъединена");
      render();
      if (autoFitFilledCells()) render();
    }

    function startColResize(event) {
      if (event.pointerType === "touch" || event.button !== 0) return;
      event.stopPropagation();
      event.preventDefault();
      const col = Number(event.currentTarget.dataset.col);
      const startX = event.clientX;
      const startLeft = state.colWidths[col];
      const startRight = state.colWidths[col + 1];
      const scale = Number(getComputedStyle(document.documentElement).getPropertyValue("--scale")) || 1;
      const move = e => {
        const dx = (e.clientX - startX) / scale;
        const left = Math.max(MIN_COL, startLeft + dx);
        const right = Math.max(MIN_COL, startRight - dx);
        const correction = startLeft + startRight - left - right;
        state.colWidths[col] = left + correction / 2;
        state.colWidths[col + 1] = right + correction / 2;
        render();
      };
      const up = () => {
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
      };
      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up);
    }

    function startRowResize(event) {
      if (event.pointerType === "touch" || event.button !== 0) return;
      event.stopPropagation();
      event.preventDefault();
      const section = sections.find(s => s.id === event.currentTarget.dataset.section);
      const row = Number(event.currentTarget.dataset.row);
      const startY = event.clientY;
      const startHeights = section.rowHeights.slice();
      const startTop = section.rowHeights[row];
      const edge = event.currentTarget.dataset.edge;
      const startBottom = section.rowHeights[row + 1];
      const scale = Number(getComputedStyle(document.documentElement).getPropertyValue("--scale")) || 1;
      const boundarySection = sections.find(s => s.id === event.currentTarget.dataset.boundarySection);
      const boundaryIndex = boundarySection ? sections.indexOf(boundarySection) : -1;
      const boundaryPrev = boundaryIndex > 0 ? sections[boundaryIndex - 1] : null;
      const boundaryCurr = boundaryIndex > 0 ? sections[boundaryIndex] : null;
      const boundaryPrevHeights = boundaryPrev?.rowHeights.slice() || [];
      const boundaryCurrHeights = boundaryCurr?.rowHeights.slice() || [];
      const resizeBoundaryRow = (delta, donorIndexes) => {
        if (!donorIndexes.length) return false;
        const targetSpare = Math.max(0, startHeights[row] - MIN_ROW);
        const donorSpare = donorIndexes.reduce((total, index) => total + Math.max(0, startHeights[index] - MIN_ROW), 0);
        let applied = delta;
        if (applied > 0) applied = Math.min(applied, donorSpare);
        if (applied < 0) applied = -Math.min(-applied, targetSpare);
        if (Math.abs(applied) <= .5) return false;

        const nextHeights = startHeights.slice();
        nextHeights[row] = startHeights[row] + applied;
        const donorDelta = -applied;
        if (donorDelta > 0) {
          const donorTotal = donorIndexes.reduce((total, index) => total + startHeights[index], 0) || donorIndexes.length;
          donorIndexes.forEach(index => {
            nextHeights[index] = startHeights[index] + donorDelta * (startHeights[index] / donorTotal || 1 / donorIndexes.length);
          });
        } else {
          const spare = donorSpare || donorIndexes.length;
          donorIndexes.forEach(index => {
            const rowSpare = Math.max(0, startHeights[index] - MIN_ROW);
            nextHeights[index] = startHeights[index] + donorDelta * (rowSpare / spare || 1 / donorIndexes.length);
          });
        }
        section.rowHeights = nextHeights.map(height => Math.max(MIN_ROW, height));
        return true;
      };
      const move = e => {
        const dy = (e.clientY - startY) / scale;
        if (edge === "section-boundary" && boundaryPrev && boundaryCurr) {
          const prevLast = boundaryPrevHeights.length - 1;
          const maxDown = Math.max(0, boundaryCurrHeights[0] - MIN_ROW);
          const maxUp = Math.max(0, boundaryPrevHeights[prevLast] - MIN_ROW);
          const applied = Math.max(-maxUp, Math.min(maxDown, dy));
          boundaryPrev.rowHeights = boundaryPrevHeights.slice();
          boundaryCurr.rowHeights = boundaryCurrHeights.slice();
          boundaryPrev.rowHeights[prevLast] = boundaryPrevHeights[prevLast] + applied;
          boundaryCurr.rowHeights[0] = boundaryCurrHeights[0] - applied;
          render();
          return;
        }
        if (edge === "top") {
          resizeBoundaryRow(dy, section.rowHeights.map((_, index) => index).filter(index => index > row));
          render();
          return;
        }
        if (edge === "bottom") {
          resizeBoundaryRow(dy, section.rowHeights.map((_, index) => index).filter(index => index < row));
          render();
          return;
        }
        const top = Math.max(MIN_ROW, startTop + dy);
        const bottom = Math.max(MIN_ROW, startBottom - dy);
        const correction = startTop + startBottom - top - bottom;
        section.rowHeights[row] = top + correction / 2;
        section.rowHeights[row + 1] = bottom + correction / 2;
        render();
      };
      const up = () => {
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
      };
      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up);
    }

    function applyScale() {
      const scale = state.zoom / 100;
      document.documentElement.style.setProperty("--scale", scale);
      document.getElementById("sheetWrap").style.width = `${SHEET_W * scale}px`;
      document.getElementById("sheetWrap").style.height = `${SHEET_H * scale}px`;
    }

    function syncZoomControls() {
      zoomRange.value = state.zoom;
      mobileZoomRange.value = state.zoom;
      zoomValue.textContent = `${state.zoom}%`;
    }

    function setZoom(value) {
      state.zoom = Math.max(8, Math.min(80, Math.round(value)));
      syncZoomControls();
      applyScale();
    }

    function setPanMode(value) {
      panMode = Boolean(value);
      document.getElementById("panBtn").classList.toggle("active", panMode);
      stage.classList.toggle("pan-mode", panMode);
      if (panMode) {
        selectMode = false;
        selected.clear();
        document.getElementById("selectBtn").classList.remove("active");
        render();
      }
    }

    function startPan(event) {
      if (!panMode || modal.classList.contains("open") || (event.button !== 0 && event.pointerType !== "touch")) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      stage.setPointerCapture?.(event.pointerId);
      panDrag = {
        id: event.pointerId,
        x: event.clientX,
        y: event.clientY,
        left: stage.scrollLeft,
        top: stage.scrollTop
      };
      stage.classList.add("panning");
      const move = moveEvent => {
        if (!panDrag) return;
        moveEvent.preventDefault();
        stage.scrollLeft = panDrag.left - (moveEvent.clientX - panDrag.x);
        stage.scrollTop = panDrag.top - (moveEvent.clientY - panDrag.y);
      };
      const up = () => {
        if (panDrag?.id !== undefined) stage.releasePointerCapture?.(panDrag.id);
        panDrag = null;
        stage.classList.remove("panning");
        window.removeEventListener("pointermove", move, true);
        window.removeEventListener("pointerup", up, true);
      };
      window.addEventListener("pointermove", move, true);
      window.addEventListener("pointerup", up, true);
    }

    function zoomByWheel(event) {
      if (modal.classList.contains("open")) return;
      event.preventDefault();
      const oldScale = state.zoom / 100;
      const rect = stage.getBoundingClientRect();
      const pointerX = event.clientX - rect.left + stage.scrollLeft;
      const pointerY = event.clientY - rect.top + stage.scrollTop;
      const sheetX = pointerX / oldScale;
      const sheetY = pointerY / oldScale;
      const step = event.deltaY < 0 ? 3 : -3;
      setZoom(state.zoom + step);
      const newScale = state.zoom / 100;
      stage.scrollLeft = sheetX * newScale - (event.clientX - rect.left);
      stage.scrollTop = sheetY * newScale - (event.clientY - rect.top);
    }

    function getTouchDistance(touches) {
      return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    }

    function getTouchCenter(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }

    function startPinchZoom(event) {
      if (modal.classList.contains("open") || event.touches.length !== 2) return;
      event.preventDefault();
      panDrag = null;
      stage.classList.remove("panning");
      const oldScale = state.zoom / 100;
      const rect = stage.getBoundingClientRect();
      const center = getTouchCenter(event.touches);
      pinchZoom = {
        distance: getTouchDistance(event.touches),
        zoom: state.zoom,
        sheetX: (center.x - rect.left + stage.scrollLeft) / oldScale,
        sheetY: (center.y - rect.top + stage.scrollTop) / oldScale,
        offsetX: center.x - rect.left,
        offsetY: center.y - rect.top
      };
    }

    function movePinchZoom(event) {
      if (!pinchZoom || modal.classList.contains("open") || event.touches.length !== 2) return;
      event.preventDefault();
      const distance = getTouchDistance(event.touches);
      if (!distance || !pinchZoom.distance) return;
      setZoom(pinchZoom.zoom * (distance / pinchZoom.distance));
      const newScale = state.zoom / 100;
      stage.scrollLeft = pinchZoom.sheetX * newScale - pinchZoom.offsetX;
      stage.scrollTop = pinchZoom.sheetY * newScale - pinchZoom.offsetY;
    }

    function endPinchZoom(event) {
      if (event.touches.length < 2) {
        pinchZoom = null;
        return;
      }
      startPinchZoom(event);
    }

    function loadExternalScript(src) {
      return new Promise((resolve, reject) => {
        const existing = [...document.scripts].find(script => script.src === src);
        if (existing) {
          existing.addEventListener("load", resolve, { once: true });
          existing.addEventListener("error", reject, { once: true });
          return;
        }
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Script not loaded: ${src}`));
        document.head.appendChild(script);
      });
    }

    async function ensurePdfLibraries() {
      if (!window.html2canvas) {
        await loadExternalScript("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js");
      }
      if (!window.jspdf?.jsPDF) {
        await loadExternalScript("https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js");
      }
      if (!window.html2canvas || !window.jspdf?.jsPDF) {
        throw new Error("PDF libraries are unavailable");
      }
    }

    async function waitForFonts() {
      if (!document.fonts?.ready) return;
      await Promise.race([
        document.fonts.ready,
        new Promise(resolve => setTimeout(resolve, 3500))
      ]);
    }

    async function exportPdf() {
      setStatus("Рендер PDF...");
      selected.clear();
      render();
      const oldScale = state.zoom;
      sheet.classList.add("exporting");
      try {
        await ensurePdfLibraries();
        await waitForFonts();
        const canvas = await window.html2canvas(sheet, {
          scale: A3_400_SCALE,
          width: SHEET_W,
          height: SHEET_H,
          backgroundColor: "#ffffff",
          useCORS: true,
          allowTaint: false,
          removeContainer: true,
          logging: false
        });
        const img = canvas.toDataURL("image/png");
        const pdf = new window.jspdf.jsPDF({
          orientation: "landscape",
          unit: "mm",
          format: "a3",
          compress: true
        });
        pdf.addImage(img, "PNG", 0, 0, 420, 297, undefined, "FAST");
        pdf.save("Doroga-2026-Planner-A3-400dpi.pdf");
        setStatus("PDF готов");
      } catch (error) {
        console.error(error);
        setStatus("Ошибка PDF");
      } finally {
        sheet.classList.remove("exporting");
        setZoom(oldScale);
        render();
      }
    }

    function saveState() {
      const blob = new Blob([JSON.stringify({ state, sections }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "doroga-planner-state.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function loadState(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          Object.assign(state, data.state || {});
          if (Array.isArray(data.sections)) {
            data.sections.forEach(saved => {
              const section = sections.find(s => s.id === saved.id);
              if (section && Array.isArray(saved.rowHeights)) section.rowHeights = saved.rowHeights;
            });
          }
          selected.clear();
          setZoom(state.zoom);
          render();
          if (autoFitFilledCells()) render();
          setStatus("Состояние загружено");
        } catch (error) {
          setStatus("JSON не прочитан");
        }
      };
      reader.readAsText(file);
    }

    document.querySelectorAll("[data-cmd]").forEach(button => {
      button.addEventListener("mousedown", event => event.preventDefault());
      button.addEventListener("click", () => {
        editorArea.focus();
        restoreEditorSelection();
        document.execCommand(button.dataset.cmd, false, null);
        saveEditorSelection();
      });
    });

    document.querySelectorAll("[data-font]").forEach(button => {
      button.addEventListener("mousedown", event => event.preventDefault());
      button.addEventListener("click", () => {
        applyInlineFont(button.dataset.font);
        updateFontButtons();
      });
    });

    document.querySelectorAll("[data-italic]").forEach(button => {
      button.addEventListener("mousedown", event => event.preventDefault());
      button.addEventListener("click", () => {
        applyInlineClass("font-italic");
        updateFontButtons();
      });
    });

    document.querySelectorAll("[data-insert]").forEach(button => {
      button.addEventListener("mousedown", event => event.preventDefault());
      button.addEventListener("click", () => {
        editorArea.focus();
        restoreEditorSelection();
        const value = button.dataset.insert === "«»" ? "«»" : button.dataset.insert;
        document.execCommand("insertText", false, value);
        saveEditorSelection();
      });
    });

    document.querySelectorAll("[data-bg]").forEach(button => {
      button.addEventListener("click", () => {
        if (activeTarget?.classList.contains("cell")) activeTarget.dataset.nextBg = button.dataset.bg;
      });
    });

    editorArea.addEventListener("paste", event => {
      event.preventDefault();
      const text = event.clipboardData.getData("text/plain");
      document.execCommand("insertText", false, text);
      saveEditorSelection();
    });
    ["keyup", "mouseup", "input", "focus"].forEach(eventName => {
      editorArea.addEventListener(eventName, () => {
        saveEditorSelection();
        updateFontButtons();
      });
    });
    document.addEventListener("selectionchange", () => {
      if (modal.classList.contains("open")) updateFontButtons();
    });

    document.getElementById("applyEditor").addEventListener("click", applyEditor);
    document.getElementById("cancelEditor").addEventListener("click", closeEditor);
    document.getElementById("closeEditor").addEventListener("click", closeEditor);
    modal.addEventListener("click", event => {
      if (event.target === modal) closeEditor();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && modal.classList.contains("open")) closeEditor();
    });

    document.getElementById("selectBtn").addEventListener("click", event => {
      selectMode = !selectMode;
      if (selectMode) setPanMode(false);
      event.currentTarget.classList.toggle("active", selectMode);
      if (!selectMode) selected.clear();
      render();
    });
    document.getElementById("panBtn").addEventListener("click", () => setPanMode(!panMode));
    document.getElementById("mergeBtn").addEventListener("click", mergeSelected);
    document.getElementById("splitBtn").addEventListener("click", splitSelected);
    document.getElementById("pdfBtn").addEventListener("click", exportPdf);
    document.getElementById("saveBtn").addEventListener("click", saveState);
    document.getElementById("loadBtn").addEventListener("click", () => document.getElementById("stateFile").click());
    document.getElementById("stateFile").addEventListener("change", event => {
      if (event.target.files[0]) loadState(event.target.files[0]);
      event.target.value = "";
    });

    zoomRange.addEventListener("input", event => {
      setZoom(Number(event.target.value));
    });
    mobileZoomRange.addEventListener("input", event => {
      setZoom(Number(event.target.value));
    });
    document.getElementById("zoomOutBtn").addEventListener("click", () => {
      setZoom(state.zoom - 3);
    });
    document.getElementById("zoomInBtn").addEventListener("click", () => {
      setZoom(state.zoom + 3);
    });

    stage.addEventListener("wheel", zoomByWheel, { passive: false });
    stage.addEventListener("touchstart", startPinchZoom, { passive: false });
    stage.addEventListener("touchmove", movePinchZoom, { passive: false });
    stage.addEventListener("touchend", endPinchZoom, { passive: false });
    stage.addEventListener("touchcancel", endPinchZoom, { passive: false });
    stage.addEventListener("pointerdown", startPan, true);
    stage.addEventListener("click", event => {
      if (!panMode) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
    }, true);

    window.addEventListener("resize", applyScale);

    render();
  </script>
</body>
</html>
